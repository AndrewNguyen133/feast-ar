<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Golden Hour - AR</title>
<script src="./libs/aframe.min.js"></script>
<script src="./libs/mindar-image-aframe.prod.js"></script>
<style>
html, body { margin: 0; font-family: Georgia, serif; background: #0d0b08; }
#start-overlay { position: fixed; inset: 0; z-index: 1000;
  background: radial-gradient(ellipse at 50% 30%, #2a2015 0%, #0d0b08 70%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px; color: #e8dcc0; text-align: center; padding: 32px; }
#start-overlay h1 { font-size: 22px; letter-spacing: 0.25em; text-transform: uppercase;
  font-weight: normal; margin: 0; color: #c9a84c; }
#start-overlay p { max-width: 300px; line-height: 1.6; margin: 0; font-size: 15px; opacity: 0.85; }
#start-btn { background: none; border: 1px solid #c9a84c; color: #c9a84c;
  padding: 14px 40px; font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
  font-family: inherit; cursor: pointer; }
#log { position: fixed; top: 8px; left: 8px; right: 8px; z-index: 1001;
  color: #7fff9e; font: 12px/1.5 monospace; text-shadow: 0 1px 3px #000;
  pointer-events: none; white-space: pre-wrap; }
#hint { position: fixed; bottom: 24px; left: 0; right: 0; z-index: 999; text-align: center;
  color: #e8dcc0; font-size: 14px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); display: none; }
/* hide MindAR's built-in white scanning/loading overlays */
.mindar-ui-overlay { display: none !important; }
#reveal { position: fixed; left: 0; right: 0; top: 50%; transform: translateY(-50%);
  height: 50vh; z-index: 998; display: none;
  background: rgba(0,0,0,0.92); box-shadow: 0 0 60px rgba(0,0,0,0.9);
  flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
#reveal.on { display: flex; }
#reveal video { width: 100%; max-height: calc(50vh - 44px); object-fit: contain; }
#reveal .cap { color: #c9a84c; font-size: 13px; letter-spacing: 0.22em;
  text-transform: uppercase; }
</style>
</head>
<body>
<div id="log"></div>
<div id="start-overlay">
  <h1>The Golden Hour</h1>
  <p>Point your camera at the artwork and the standoff will come to life. Tap to reveal the menu.</p>
  <button id="start-btn">Begin</button>
</div>
<div id="hint">Aim at the menu artwork</div>

<div id="reveal">
  <video id="reveal-video" src="./assets/feast.mp4?v=16" preload="auto" loop muted playsinline webkit-playsinline></video>
  <div class="cap">Tap to view the menu</div>
</div>

<a-scene mindar-image="imageTargetSrc: ./targets.mind?v=16;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
</a-scene>

<script>
const MENU_URL = './menu.html?v=18';
const logEl = document.getElementById('log');
const log = (m) => { logEl.textContent += m + '\n'; };
log('version 18 - camera stays on');
window.addEventListener('error', (e) => log('JS ERROR: ' + e.message));

const sceneEl = document.querySelector('a-scene');
const reveal = document.getElementById('reveal');
const revealVideo = document.getElementById('reveal-video');
let revealed = false;
const hint = document.getElementById('hint');
const target = document.getElementById('target');
let targetVisible = false;
let interactionReady = false;

sceneEl.addEventListener('arReady', () => {
  log('AR READY');
  setTimeout(() => { logEl.textContent = ''; }, 2000);
});
sceneEl.addEventListener('arError', (e) => log('AR ERROR: ' + JSON.stringify(e.detail || {})));

document.getElementById('start-btn').addEventListener('click', async (e) => {
  e.stopPropagation();
  try { await revealVideo.play(); revealVideo.pause(); } catch (err) {}
  document.getElementById('start-overlay').style.display = 'none';
  hint.style.display = 'block';
  setTimeout(() => { interactionReady = true; }, 500);
});

target.addEventListener('targetFound', () => {
  targetVisible = true;
  if (!revealed) {
    revealed = true;
    reveal.classList.add('on');
    hint.style.display = 'none';
    revealVideo.currentTime = 0; revealVideo.play();
    setTimeout(() => {
      try { sceneEl.systems['mindar-image-system'].pause(true); } catch (err) {}
    }, 300);
  }
});
target.addEventListener('targetLost', () => { targetVisible = false; });
reveal.addEventListener('click', () => {
  if (interactionReady) window.location.href = MENU_URL;
});
['stalled','waiting','pause'].forEach((ev) => {
  revealVideo.addEventListener(ev, () => {
    if (revealed && revealVideo.paused) setTimeout(() => revealVideo.play().catch(()=>{}), 250);
  });
});
let lastT = -1, stuckCount = 0;
setInterval(() => {
  if (!revealed) return;
  const t = revealVideo.currentTime;
  if (t === lastT && !revealVideo.paused) {
    stuckCount++;
    if (stuckCount >= 2) {
      revealVideo.currentTime = (t + 0.05) % (revealVideo.duration || 10);
      revealVideo.play().catch(()=>{});
      stuckCount = 0;
    }
  } else { stuckCount = 0; }
  lastT = t;
}, 700);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && revealed) revealVideo.play().catch(()=>{});
});
</script>
</body>
</html>
